apiVersion: v1
kind: Secret
metadata:
  name: back-end-secret
  namespace: detourpilot
  labels:
    app.kubernetes.io/part-of: detourpilot
    app.kubernetes.io/component: back-end
type: Opaque
stringData:
  # Replace the DATABASE_URL with the production DSN, e.g.
  #   postgres://USER:PASSWORD@postgres.detourpilot.svc.cluster.local:5432/detourpilot?sslmode=disable
  # The default below matches the postgres service in this directory.
  DATABASE_URL: postgres://detourpilot:detourpilot@postgres:5432/detourpilot?sslmode=disable
  # Generate a real secret: `openssl rand -base64 48`
  JWT_SECRET: dev-only-secret-change-me
