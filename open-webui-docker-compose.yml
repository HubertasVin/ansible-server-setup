---
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    ports:
      - "3003:8080"
    # depends_on:
    #   - searxng
    environment:
      # Force env vars to override persisted Admin UI settings
      - ENABLE_PERSISTENT_CONFIG=false
      # Enable CORS
      - CORS_ALLOW_ORIGIN=https://%aichat_domain%
      # Identify server for web-search/user-agent warnings
      - USER_AGENT=OpenWebUI/%aichat_domain%
      # Disable generated follow-up question suggestions
      - ENABLE_FOLLOW_UP_GENERATION=false
      # This can help avoid Open WebUI trying to interact with local Ollama
      - ENABLE_OLLAMA_API=false
      # Avoid local reranker model loading
      - RAG_RERANKING_MODEL=

      # External Providers
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=https://api.openai.com/v1;https://api.z.ai/api/paas/v4;https://api.mistral.ai/v1;https://openrouter.ai/api/v1
      - OPENAI_API_KEYS=%openai_api_key%;%z_ai_api_key%;%mistral_api_key%;%openrouter_api_key%
      # RAG
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - RAG_OPENAI_API_KEY=%openrouter_api_key%
      # Audio
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - AUDIO_STT_OPENAI_API_KEY=%openrouter_api_key%
      # Image
      - IMAGE_GENERATION_ENGINE=openai
      - IMAGES_OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - IMAGES_OPENAI_API_KEY=%openrouter_api_key%

      # Models
      # RAG
      - RAG_EMBEDDING_MODEL=openai/text-embedding-3-small:floor
      # Speech-to-text
      - AUDIO_STT_MODEL=openai/whisper-1:floor
      # Image generation
      - ENABLE_IMAGE_GENERATION=false
      - IMAGE_GENERATION_MODEL=openai/gpt-5-image-mini:floor

      # Internal task model (titles, tags)
      - TASK_MODEL=meta-llama/llama-3.2-3b-instruct:free

      # External task model (web search, internet-dependent tasks)
      - TASK_MODEL_EXTERNAL=meta-llama/llama-3.2-3b-instruct:free

      # Web search
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=brave
      - BRAVE_SEARCH_API_KEY=%brave_api_key%
      # - WEB_SEARCH_ENGINE=searxng
      # - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json&language=en

    networks:
      - owui-net

    volumes:
      # Persistent Data storage
      - openwebui-data:/app/backend/data

    restart: always
    mem_limit: 1g
    memswap_limit: 1g

