services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3003:8080"
    environment:
      # External Providers
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=https://api.openai.com/v1;https://api.z.ai/api/paas/v4;https://api.mistral.ai/v1
      - OPENAI_API_KEYS=%openai_api_key%;%z_ai_api_key%

      # Web search via ddgs using DuckDuckGo backend
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=ddgs
      - DDGS_BACKEND=duckduckgo
      - RAG_WEB_SEARCH_RESULT_COUNT=8
    volumes:
      # Mapping the system-wide Ollama directory
      - /usr/share/ollama/.ollama:/root/.ollama
      # Persistent Data storage
      - openwebui-data:/app/backend/data
    restart: always
volumes:
  openwebui-data:
