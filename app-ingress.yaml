apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: back-end
  namespace: detourpilot
  labels:
    app.kubernetes.io/part-of: detourpilot
  annotations:
    # Terminate TLS at the edge (cert-manager + Let's Encrypt) by
    # adding a TLS block and the cert-manager
    # `cert-manager.io/cluster-issuer` annotation. Until then we
    # serve plain HTTP, which is fine for an internal vps.
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.detourpilot.hubertasvin.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: back-end
                port:
                  number: 80
