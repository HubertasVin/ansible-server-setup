apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: detourpilot
resources:
  - namespace.yaml
  - postgres-secret.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - app-config.yaml
  - app-secret.yaml
  - app-deployment.yaml
  - app-service.yaml
  - app-ingress.yaml
  # ingress-nginx lives in its own namespace and contains a
  # `Namespace` object of its own. Pulling it into a
  # sub-kustomization means the global `namespace: detourpilot`
  # is NOT applied to its resources (which would otherwise
  # produce a Namespace-id conflict during `apply -k`).
  - ingress-nginx
