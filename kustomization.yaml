apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: detourpilot
resources:
  - namespace.yaml
  - postgres-secret.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - app-config.yaml
  - app-secret.yaml
  - app-deployment.yaml
  - app-service.yaml
  - app-ingress.yaml
  # ingress-nginx is in its own namespace and has no namespace
  # override, so it sits outside the `namespace: detourpilot`
  # applied to the rest of the resources above. It must still
  # be applied so the `nginx` IngressClass exists for our app
  # Ingress to bind to.
  - ingress-nginx.yaml
