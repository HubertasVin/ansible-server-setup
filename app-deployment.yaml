apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-end
  namespace: detourpilot
  labels:
    app.kubernetes.io/name: back-end
    app.kubernetes.io/part-of: detourpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: back-end
      app.kubernetes.io/part-of: detourpilot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: back-end
        app.kubernetes.io/part-of: detourpilot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      # Image is built locally on the vps and imported into k3s's
      # containerd (`docker save … | sudo k3s ctr images import -`),
      # so we use IfNotPresent and do not need registry pull secrets.
      # The build+import pipeline is wired into deploy.sh.
      containers:
        - name: back-end
          image: detourpilot-back-end:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7651
          envFrom:
            - configMapRef:
                name: back-end-config
            - secretRef:
                name: back-end-secret
          readinessProbe:
            # TCP socket probe — only checks that the server has bound
            # port 7651. An HTTP probe would need a route that returns
            # 2xx; the app has no such route today (it returns 404 for
            # unknown /trips/plan GETs, which kubelet counts as failure).
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        # Persist the seeded JSON files (ranking/places/trips) across
        # pod restarts. The path on the host must exist on every k3s
        # node that may schedule this pod — for a single-node cluster
        # this is fine; for HA, replace with a RWX PVC (NFS, Longhorn).
        - name: data
          hostPath:
            path: /var/lib/detourpilot/data
            type: DirectoryOrCreate
